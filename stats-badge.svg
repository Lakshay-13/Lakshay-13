<svg xmlns="http://www.w3.org/2000/svg" width="500" height="130" viewBox="0 0 500 130">
  <rect width="500" height="130" rx="12" fill="#121218"/>
  
  <!-- Title -->
  <text x="250" y="32" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#f0f0f0" letter-spacing="1">LIVE ECOSYSTEM STATS</text>
  
  <!-- Fren -->
  <g transform="translate(20, 45)">
    <rect width="225" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="12" y="14" font-family="Helvetica, Arial, sans-serif" font-size="8" font-weight="600" fill="#888">FREN</text>
    <text x="12" y="29" font-family="Helvetica, Arial, sans-serif" font-size="7" fill="#666">Active servers</text>
    <text x="210" y="24" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#0afa9e">902</text>
  </g>
  
  <!-- NotifyMe -->
  <g transform="translate(255, 45)">
    <rect width="225" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="12" y="14" font-family="Helvetica, Arial, sans-serif" font-size="8" font-weight="600" fill="#888">NOTIFYME</text>
    <text x="12" y="29" font-family="Helvetica, Arial, sans-serif" font-size="7" fill="#666">Notifications sent</text>
    <text x="210" y="24" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#0afa9e">302</text>
  </g>
  
  <!-- URL Extractor -->
  <g transform="translate(20, 90)">
    <rect width="225" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="12" y="14" font-family="Helvetica, Arial, sans-serif" font-size="8" font-weight="600" fill="#888">URL EXTRACTOR</text>
    <text x="12" y="29" font-family="Helvetica, Arial, sans-serif" font-size="7" fill="#666">URLs mapped</text>
    <text x="210" y="24" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#0afa9e">3</text>
  </g>
  
  <!-- ArtGridX -->
  <g transform="translate(255, 90)">
    <rect width="225" height="36" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="12" y="14" font-family="Helvetica, Arial, sans-serif" font-size="8" font-weight="600" fill="#888">ARTGRIDX</text>
    <text x="12" y="29" font-family="Helvetica, Arial, sans-serif" font-size="7" fill="#666">Profiles hosted</text>
    <text x="210" y="24" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#0afa9e">2</text>
  </g>
</svg>
